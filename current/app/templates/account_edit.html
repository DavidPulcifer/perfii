{% extends "layout.html" %}
{% block content %}
<h4>Edit Account</h4>
<form method="post" class="row g-2" id="accountEditForm">
  <div class="col-4">
    <label class="form-label">Name</label>
    <input class="form-control" name="name" value="{{ a.name }}" required>
  </div>
  <div class="col-4">
    <label class="form-label">Bank ID</label>
    <input class="form-control" name="bankid" value="{{ a.bankid or '' }}">
  </div>
  <div class="col-4">
    <label class="form-label">Account ID</label>
    <input class="form-control" name="acctid" value="{{ a.acctid or '' }}">
  </div>

  <div class="col-4">
    <label class="form-label">Type</label>
    {% if editable_type_options %}
      <select class="form-select" name="account_type" id="accountType">
        {% for value, label in editable_type_options %}
          <option value="{{ value }}" {{ 'selected' if a.account_type == value else '' }}>{{ label }}</option>
        {% endfor %}
      </select>
    {% else %}
      <input type="hidden" name="account_type" value="{{ a.account_type }}">
      <input class="form-control" value="{{ a.account_type }}" disabled>
      <div class="form-text">Type conversion here currently supports only Bank ↔ Credit Card.</div>
    {% endif %}
  </div>
  <div class="col-4 {% if a.account_type != 'credit_card' %}d-none{% endif %}" data-type="credit_card">
    <label class="form-label">Credit limit ($)</label>
    <input class="form-control" name="credit_limit" type="number" step="0.01" value="{{ ((credit_limit_cents or 0)/100) if credit_limit_cents is not none else '' }}" placeholder="0.00">
  </div>
  <div class="col-4 {% if a.account_type != 'loan' %}d-none{% endif %}" data-type="loan">
    <label class="form-label">Original principal ($)</label>
    <input class="form-control" name="original_principal" type="number" step="0.01" min="0" value="{{ ((loan.original_principal_cents or 0)/100) if loan and loan.original_principal_cents is not none else '' }}" placeholder="0.00">
  </div>
  <div class="col-4 {% if a.account_type != 'loan' %}d-none{% endif %}" data-type="loan">
    <label class="form-label">Normal monthly payment ($)</label>
    <input class="form-control" name="normal_monthly_payment" type="number" step="0.01" min="0" value="{{ ((loan.normal_monthly_payment_cents or 0)/100) if loan and loan.normal_monthly_payment_cents is not none else '' }}" placeholder="0.00">
  </div>

  <hr class="mt-3">

  <div class="col-3">
    <label class="form-label">Starting balance ($)</label>
    <input class="form-control" type="number" step="0.01" name="opening_balance" value="{{ (a.opening_balance_cents or 0)/100 }}">
  </div>
  <div class="col-3">
    <label class="form-label">Starting balance date</label>
    <input class="form-control" type="date" name="opening_date" value="{{ a.opening_date or '' }}">
  </div>
  <div class="col-6 d-flex align-items-end">
    <div class="form-check">
      <input class="form-check-input" type="checkbox" value="1" name="clear_opening" id="clear_opening">
      <label class="form-check-label" for="clear_opening">Clear starting balance & date</label>
    </div>
  </div>

  <div class="col-12 mt-2">
    <button class="btn btn-primary">Save changes</button>
    <a class="btn btn-outline-secondary" href="{{ url_for('accounts.list_accounts') }}">Cancel</a>
  </div>
</form>

<script>
(function(){
  const typeSel = document.getElementById('accountType');
  if (!typeSel) return;
  const toggleByType = () => {
    document.querySelectorAll('#accountEditForm [data-type]').forEach(el => {
      el.classList.toggle('d-none', el.getAttribute('data-type') !== typeSel.value);
    });
  };
  typeSel.addEventListener('change', toggleByType);
  toggleByType();
})();
</script>
{% endblock %}
