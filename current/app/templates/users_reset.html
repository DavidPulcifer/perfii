{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card">
      <div class="card-body">
        <h4 class="card-title mb-3">Reset password for {{ u.name }}</h4>
        <p class="text-muted">This one-time reset link only lets you set a new password. It does not make the account passwordless.</p>
        <form method="post" action="{{ url_for('users.reset_password', token=token) }}">
          <div class="mb-3">
            <label class="form-label">New password</label>
            <input class="form-control" type="password" name="new_password" autocomplete="new-password" minlength="8" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm new password</label>
            <input class="form-control" type="password" name="confirm_password" autocomplete="new-password" minlength="8" required>
          </div>
          <button class="btn btn-primary">Set new password</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
